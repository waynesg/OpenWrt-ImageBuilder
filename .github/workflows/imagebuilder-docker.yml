name: ImageBuilder (docker, x86_64 24.10)

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  FEED_BASE: https://waynesg.github.io/OpenWrt-ImageBuilder/feed
  LUCI_VERSION: "24.10.0"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Prepare FILES
        run: |
          set -e
          rm -rf files
          mkdir -p files
          rsync -a image/files/ files/

          chmod +x scripts/preset-clash-core.sh
          scripts/preset-clash-core.sh amd64 files

      - name: Download 3rd-party ipks (from waynesg feed)
        run: |
          set -euo pipefail
          rm -rf packages && mkdir -p packages
          curl -fsSL "$FEED_BASE/Packages.gz" | gzip -dc > /tmp/waynesg.Packages

          want_pkgs=(
            luci-app-autoupdate
            luci-app-tailscale
            luci-app-argon-config
            luci-app-aurora-config
            luci-app-mosdns
            luci-app-wechatpush
            luci-app-onliner
            luci-app-airconnect
            airconnect
            luci-app-timecontrol
            luci-app-subconverter
            # luci-app-yt-dlp (removed)
          )

          # cache-bust
          qs="?ts=${GITHUB_RUN_ID}"

          fetch_one() {
            local pkg="$1"
            local line
            local ipk
            line=$(grep -n "^Package: ${pkg}$" /tmp/waynesg.Packages | head -n1 | cut -d: -f1 || true)
            if [ -z "$line" ]; then
              echo "[skip] $pkg not found in feed index"
              return 0
            fi
            ipk=$(awk -v s="$line" 'NR>=s{print; if($0=="") exit}' /tmp/waynesg.Packages | sed -n 's/^Filename: //p' | head -n1)
            echo "[get] $pkg -> $ipk"
            test -n "$ipk"
            curl -fL "$FEED_BASE/$ipk$qs" -o "packages/$ipk"
          }

          for p in "${want_pkgs[@]}"; do
            fetch_one "$p"
          done

          ls -la packages

      - name: Build via ImageBuilder container
        run: |
          set -e
          docker pull "immortalwrt/imagebuilder:x86-64-openwrt-${LUCI_VERSION}"

          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/packages:/home/build/immortalwrt/packages" \
            "immortalwrt/imagebuilder:x86-64-openwrt-${LUCI_VERSION}" \
            /bin/bash -lc '
              set -e
              cd /home/build/immortalwrt

              # Disable signature checking for local repo (otherwise opkg requires packages/Packages.sig)
              # opkg treats check_signature as a boolean: if the line exists, it is ON.
              sed -i "/^option[[:space:]]\+check_signature/d" repositories.conf

              # Build local Packages index from downloaded ipks
              rm -f packages/Packages packages/Packages.gz
              rm -rf /tmp/opkg-utils
              git clone --depth=1 https://git.yoctoproject.org/opkg-utils /tmp/opkg-utils
              /tmp/opkg-utils/opkg-make-index packages > packages/Packages
              gzip -9nc packages/Packages > packages/Packages.gz
              grep -nE "^Package: luci-app-(tailscale|autoupdate)$" packages/Packages

              PKGS="luci ca-bundle \
                containerd docker dockerd docker-compose luci-app-dockerman \
                luci-app-diskman luci-app-filemanager \
                luci-app-upnp luci-app-wol luci-app-ddns luci-app-smartdns \
                luci-app-openvpn luci-app-openvpn-server luci-app-zerotier \
                tailscale luci-app-tailscale \
                luci-app-autoupdate \
                luci-app-argon-config luci-app-aurora-config \
                luci-app-samba4 luci-app-vsftpd luci-app-usb-printer luci-app-vlmcsd luci-app-unblockneteasemusic"

              # docker/containerd + luci apps make rootfs much larger than default; enlarge ext4 rootfs (MiB)
              make image PROFILE="generic" FILES="files" V=s ROOTFS_PARTSIZE=2048 PACKAGES="$PKGS"
            '

      - name: Find firmware for release
        id: firmware
        run: |
          set -e
          # ImageBuilder outputs to bin/targets/x86/64/
          cd bin/targets/x86/64
          echo "=== Files in output dir ==="
          ls -la
          echo "=== Looking for firmware ==="
          # Find the squashfs combined image (immortalwrt uses different naming)
          FIRM=$(ls immortalwrt-*-x86-64-generic-squashfs-combined*.img.gz 2>/dev/null | head -1)
          if [ -z "$FIRM" ]; then
            FIRM=$(ls immortalwrt-*-x86-64-generic-ext4-combined*.img.gz 2>/dev/null | head -1)
          fi
          if [ -z "$FIRM" ]; then
            echo "ERROR: No firmware found!"
            ls -la *.img.gz 2>/dev/null || true
            exit 1
          fi
          echo "Firmware: $FIRM"
          # Rename to .bin for autoupdate compatibility
          BIN_NAME="openwrt-x86-64-${LUCI_VERSION}.bin.gz"
          cp "$FIRM" "$BIN_NAME"
          echo "bin_name=$BIN_NAME" >> $GITHUB_OUTPUT
          echo "bin_size=$(ls -lh $BIN_NAME | awk '{print $5}')"
          ls -lh "$BIN_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenWrt ImmortalWrt ${LUCI_VERSION} Firmware
          tag_name: v${LUCI_VERSION}
          draft: false
          prerelease: false
          files: bin/targets/x86/64/${{ steps.firmware.outputs.bin_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: imagebuilder-docker-output
          path: bin/targets/**
