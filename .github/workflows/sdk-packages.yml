name: SDK packages feed (x86_64 24.10)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  SDK_URL: "https://downloads.immortalwrt.org/releases/24.10.0/targets/x86/64/immortalwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zstd tar gzip ca-certificates make rsync git python3 gawk coreutils

      - name: Validate SDK_URL
        run: |
          if [ -z "${SDK_URL}" ]; then
            echo "SDK_URL is empty. Set it in workflow env or repository variables." >&2
            exit 1
          fi

      - name: Download SDK
        run: |
          mkdir -p sdk
          wget -O /tmp/sdk.tar.zst "${SDK_URL}"
          tar --use-compress-program=unzstd -xf /tmp/sdk.tar.zst -C sdk --strip-components=1

      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add third-party package sources (waynesg set)
        run: |
          set -e
          cd sdk
          mkdir -p package/waynesg

          # tailscale LuCI app
          git clone --depth=1 https://github.com/asvow/luci-app-tailscale package/waynesg/luci-app-tailscale
          # Fix packaging: luci-app must not ship /etc/config or /etc/init.d that belong to tailscale.
          # Otherwise ImageBuilder opkg will fail with file clashes against the tailscale package.
          rm -f package/waynesg/luci-app-tailscale/root/etc/config/tailscale || true
          rm -f package/waynesg/luci-app-tailscale/root/etc/init.d/tailscale || true

          # autoupdate v2
          git clone --depth=1 -b 2.0 https://github.com/waynesg/luci-app-autoupdate package/waynesg/luci-app-autoupdate

          # argon theme config
          git clone --depth=1 -b master https://github.com/jerrykuku/luci-app-argon-config package/waynesg/luci-app-argon-config

          # aurora theme config
          git clone --depth=1 https://github.com/eamonxg/luci-app-aurora-config package/waynesg/luci-app-aurora-config

          # mosdns v5
          git clone --depth=1 -b v5 https://github.com/sbwml/luci-app-mosdns package/waynesg/luci-app-mosdns

          # wechatpush
          git clone --depth=1 -b master https://github.com/tty228/luci-app-wechatpush package/waynesg/luci-app-wechatpush

          # onliner
          git clone --depth=1 https://github.com/Hyy2001X/AutoBuild-Packages package/waynesg/AutoBuild-Packages
          cp -a package/waynesg/AutoBuild-Packages/luci-app-onliner package/waynesg/luci-app-onliner

          # airconnect (luci-app + core)
          git clone --depth=1 -b main https://github.com/sbwml/luci-app-airconnect package/waynesg/luci-app-airconnect
          cp -a package/waynesg/luci-app-airconnect/airconnect package/waynesg/airconnect

          # timecontrol
          git clone --depth=1 -b main https://github.com/sirpdboy/luci-app-timecontrol package/waynesg/luci-app-timecontrol

          # subconverter
          git clone --depth=1 https://github.com/kiddin9/openwrt-subconverter package/waynesg/luci-app-subconverter

          # yt-dlp
          git clone --depth=1 https://github.com/liudf0716/luci-app-yt-dlp package/waynesg/luci-app-yt-dlp

      - name: Select packages and build (waynesg set)
        run: |
          set -e
          cd sdk
          make defconfig

          # keep this list modest; add heavy stacks (openclash/passwall2) later
          TARGETS=(
            luci-app-tailscale
            luci-app-autoupdate
            luci-app-argon-config
            luci-app-aurora-config
            luci-app-mosdns
            luci-app-wechatpush
            luci-app-onliner
            luci-app-airconnect
            airconnect
            luci-app-timecontrol
            luci-app-subconverter
            luci-app-yt-dlp
          )

          echo "== waynesg package dirs =="
          ls -la package/waynesg | sed -n '1,200p'
          echo "== waynesg Makefiles =="
          find package/waynesg -maxdepth 3 -name Makefile -print | sed -n '1,200p'

          for p in "${TARGETS[@]}"; do
            echo "== compile: $p =="
            if [ ! -f "package/waynesg/$p/Makefile" ]; then
              echo "ERROR: missing package/waynesg/$p/Makefile" >&2
              exit 2
            fi
            make "package/waynesg/$p/compile" V=s
          done

      - name: Normalize ipk format (convert tar-based ipk to classic ar ipk)
        run: |
          set -e
          cd sdk
          shopt -s nullglob

          repack_one() {
            local p="$1"
            local tmpd
            tmpd=$(mktemp -d)

            # If it's gzip, decompress first.
            local src="$p"
            if file "$p" | grep -q 'gzip compressed data'; then
              src="$tmpd/src.tar"
              gunzip -c "$p" > "$src"
            fi

            if ! file "$src" | grep -q 'tar archive'; then
              rm -rf "$tmpd"
              return 0
            fi

            # Extract the three members and reassemble as ar.
            tar -xf "$src" -C "$tmpd"
            test -f "$tmpd/debian-binary"
            test -f "$tmpd/control.tar.gz"
            test -f "$tmpd/data.tar.gz"

            local out="$tmpd/out.ipk"
            (cd "$tmpd" && ar r "$out" debian-binary control.tar.gz data.tar.gz >/dev/null)

            # Replace original
            mv "$out" "$p"
            rm -rf "$tmpd"
          }

          # Repack any ipk that is actually a tar (or gzip->tar)
          while IFS= read -r p; do
            echo "== normalize: $p =="
            file "$p" || true
            repack_one "$p"
            echo "after: $(file -b "$p" || true)"
          done < <(find bin/packages -name '*.ipk' -type f)

      - name: Verify luci-app-tailscale ipk does not contain tailscale init/config
        run: |
          set -e
          cd sdk
          ipk=$(find bin/packages -name 'luci-app-tailscale_*_all.ipk' | head -n 1)
          echo "ipk=$ipk"
          test -n "$ipk"

          echo "== file info =="
          ls -la "$ipk"
          file "$ipk" || true
          ar t "$ipk" | sed -n '1,20p'

          rm -rf /tmp/ipkcheck && mkdir -p /tmp/ipkcheck
          cp "$ipk" /tmp/ipkcheck/pkg.ipk
          cd /tmp/ipkcheck
          ar x pkg.ipk

          echo "== data.tar.gz contains tailscale files? =="
          tar -tzf data.tar.gz | grep -E '^\./etc/(config/tailscale|init\.d/tailscale)$' && { echo "ERROR: file clash payload still present"; exit 1; } || true
          echo "OK: no tailscale init/config in luci-app-tailscale ipk"

      - name: Collect feed
        run: |
          mkdir -p packages-feed
          # copy all built ipks
          find sdk/bin/packages -name '*.ipk' -print -exec cp -n {} packages-feed/ \;

      - name: Normalize ipk artifacts (some outputs may be gzipped)
        run: |
          set -e
          shopt -s nullglob
          for p in packages-feed/*.ipk; do
            if file "$p" | grep -q 'gzip compressed data'; then
              echo "Decompressing gzipped ipk: $p"
              gunzip -c "$p" > "$p.tmp"
              mv "$p.tmp" "$p"
            fi
          done
          echo "== sample ipk formats =="
          for p in packages-feed/*.ipk; do
            file "$p" | sed -n '1,5p'
            break
          done

      - name: Build opkg index (Packages.gz)
        run: |
          set -e
          mkdir -p public/feed
          cp -n packages-feed/*.ipk public/feed/ || true

          # Some ipkg-make-index.sh variants call `sha256` instead of `sha256sum`.
          # Provide a wrapper if missing.
          if ! command -v sha256 >/dev/null 2>&1; then
            # Avoid heredocs (can be fragile inside YAML). Create a simple wrapper.
            printf '%s\n' '#!/bin/sh' 'exec sha256sum "$@"' | sudo tee /usr/local/bin/sha256 >/dev/null
            sudo chmod +x /usr/local/bin/sha256
          fi

          # generate Packages + Packages.gz
          # Avoid SDK scripts/ipkg-make-index.sh (can fail with sed/tar issues on some ipks)
          # and avoid distro packages (opkg-utils not available on all ubuntu runners).
          # Use upstream opkg-utils script directly.
          rm -rf /tmp/opkg-utils
          git clone --depth=1 https://git.yoctoproject.org/opkg-utils /tmp/opkg-utils
          echo "== opkg-utils ==" && ls -la /tmp/opkg-utils | sed -n '1,200p'

          # opkg-make-index can print noisy warnings like "Lost field ..." to stdout on some ipks.
          # If those land in Packages, opkg may fail to parse the index and ImageBuilder will report
          # "Unknown package ..." even though the ipk exists.
          /tmp/opkg-utils/opkg-make-index public/feed 2> public/feed/index.log \
            | grep -v '^Lost field ' \
            > public/feed/Packages
          gzip -9nc public/feed/Packages > public/feed/Packages.gz
          echo "== index warnings (if any) ==" && sed -n '1,120p' public/feed/index.log || true
          echo "Feed files:" && ls -la public/feed | sed -n '1,200p'

      - name: Upload ipk feed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-feed
          path: public/feed/

      - name: Publish feed to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
          force_orphan: true
