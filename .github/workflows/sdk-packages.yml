name: SDK packages feed (x86_64 24.10)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  SDK_URL: "https://downloads.immortalwrt.org/releases/24.10.0/targets/x86/64/immortalwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zstd tar gzip ca-certificates make rsync git python3 gawk

      - name: Validate SDK_URL
        run: |
          if [ -z "${SDK_URL}" ]; then
            echo "SDK_URL is empty. Set it in workflow env or repository variables." >&2
            exit 1
          fi

      - name: Download SDK
        run: |
          mkdir -p sdk
          wget -O /tmp/sdk.tar.zst "${SDK_URL}"
          tar --use-compress-program=unzstd -xf /tmp/sdk.tar.zst -C sdk --strip-components=1

      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add third-party package sources
        run: |
          cd sdk
          mkdir -p package/waynesg
          # Mirror the repos you currently use (from diy-repo-script.sh)
          git clone --depth=1 -b dev https://github.com/vernesong/OpenClash package/waynesg/OpenClash
          # install luci-app-openclash into feeds/luci path
          rm -rf feeds/luci/applications/luci-app-openclash || true
          mv package/waynesg/OpenClash/luci-app-openclash feeds/luci/applications/luci-app-openclash

          git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall2 package/waynesg/luci-app-passwall2
          git clone --depth=1 -b v5 https://github.com/sbwml/luci-app-mosdns package/waynesg/luci-app-mosdns
          git clone --depth=1 https://github.com/kiddin9/openwrt-subconverter package/waynesg/luci-app-subconverter
          git clone --depth=1 https://github.com/asvow/luci-app-tailscale package/waynesg/luci-app-tailscale

          # autoupdate v2 (your repo)
          git clone --depth=1 -b 2.0 https://github.com/waynesg/luci-app-autoupdate package/waynesg/luci-app-autoupdate

      - name: Select packages and build
        run: |
          cd sdk
          # NOTE: you may need to select/enable packages via make menuconfig or .config generation.
          # For CI: directly build the ipk targets.
          make defconfig

          # build a small starter set; expand as needed
          make package/feeds/luci/luci-app-openclash/compile V=s
          make package/waynesg/luci-app-passwall2/compile V=s
          make package/waynesg/luci-app-mosdns/compile V=s
          make package/waynesg/luci-app-subconverter/compile V=s
          make package/waynesg/luci-app-tailscale/compile V=s
          make package/waynesg/luci-app-autoupdate/compile V=s

      - name: Collect feed
        run: |
          mkdir -p packages-feed
          # copy all built ipks
          find sdk/bin/packages -name '*.ipk' -print -exec cp -n {} packages-feed/ \;

      - name: Build opkg index (Packages.gz)
        run: |
          set -e
          mkdir -p public/feed
          cp -n packages-feed/*.ipk public/feed/ || true
          # generate Packages + Packages.gz using SDK helper
          (cd sdk && ./scripts/ipkg-make-index.sh "$GITHUB_WORKSPACE/public/feed" > "$GITHUB_WORKSPACE/public/feed/Packages")
          gzip -9nc public/feed/Packages > public/feed/Packages.gz
          echo "Feed files:" && ls -la public/feed | sed -n '1,200p'

      - name: Upload ipk feed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-feed
          path: public/feed/

      - name: Publish feed to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
          force_orphan: true
