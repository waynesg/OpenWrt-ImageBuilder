name: ImageBuilder (x86_64 24.10)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'warmup: only download packages and save dl cache; build: make image'
        required: true
        default: 'build'
        type: choice
        options: [build, warmup]

env:
  TZ: Asia/Shanghai
  IB_URL: "https://downloads.immortalwrt.org/releases/24.10.0/targets/x86/64/immortalwrt-imagebuilder-24.10.0-x86-64.Linux-x86_64.tar.zst"
  ARCH: x86_64

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zstd tar gzip ca-certificates make rsync curl qemu-utils genisoimage unzip

      - name: Validate IB_URL
        run: |
          if [ -z "${IB_URL}" ]; then
            echo "IB_URL is empty. Set it in workflow env or repository variables." >&2
            exit 1
          fi

      - name: Download ImageBuilder
        run: |
          mkdir -p ib
          wget -O /tmp/ib.tar.zst "${IB_URL}"
          tar --use-compress-program=unzstd -xf /tmp/ib.tar.zst -C ib --strip-components=1

      - name: Patch ImageBuilder opkg verification (allow unsigned local repo)
        run: |
          cd ib
          # ImageBuilder invokes opkg with --verify-program $(SCRIPT_DIR)/opkg-key, which makes it expect Packages.sig
          # even for the local file:packages repo. For CI we want to allow unsigned local packages.
          # The OPKG definition spans multiple lines; simplest is to delete the whole line containing --verify-program.
          sed -i '/--verify-program/d' Makefile

          echo "== verify-program occurrences (should be empty) =="
          grep -n -- "--verify-program" Makefile || true

          echo "== OPKG definition (context) =="
          awk 'NR>=88 && NR<=110 {print NR ":" $0}' Makefile

      - name: Provide sha256 wrapper (ImageBuilder index script compatibility)
        run: |
          # Some ImageBuilder scripts/ipkg-make-index.sh variants call `sha256` (not present on Ubuntu runners).
          # Provide a simple wrapper so package_index doesn't fail.
          if ! command -v sha256 >/dev/null 2>&1; then
            printf '%s\n' '#!/bin/sh' 'exec sha256sum "$@"' | sudo tee /usr/local/bin/sha256 >/dev/null
            sudo chmod +x /usr/local/bin/sha256
          fi
          sha256 --help >/dev/null 2>&1 || true

      - name: Fetch 3rd-party ipks into local ImageBuilder repo
        run: |
          set -e
          cd ib
          FEED_BASE="https://waynesg.github.io/OpenWrt-ImageBuilder/feed"

          # Disable opkg signature checking.
          # In opkg config, `option check_signature` is a boolean: if the line exists, it's ON
          # (a "0" value is still treated as present). So we must remove the option entirely.
          sed -i '/^option[[:space:]]\+check_signature/d' repositories.conf

          # Download index and extract the exact ipk filenames.
          curl -fsSL "$FEED_BASE/Packages.gz" | gzip -dc > /tmp/waynesg.Packages

          # Extract Filename: field for each package stanza. Use a robust parser (stanza-based, line-oriented).
          tailscale_ipk=$(awk '
            BEGIN{RS=""}
            $0 ~ /^Package: luci-app-tailscale$/m {
              n=split($0, lines, "\n");
              for(i=1;i<=n;i++) if(lines[i] ~ /^Filename: /){sub(/^Filename: /,"",lines[i]); print lines[i]; exit}
            }
          ' /tmp/waynesg.Packages)

          autoupdate_ipk=$(awk '
            BEGIN{RS=""}
            $0 ~ /^Package: luci-app-autoupdate$/m {
              n=split($0, lines, "\n");
              for(i=1;i<=n;i++) if(lines[i] ~ /^Filename: /){sub(/^Filename: /,"",lines[i]); print lines[i]; exit}
            }
          ' /tmp/waynesg.Packages)

          echo "luci-app-tailscale ipk: $tailscale_ipk"
          echo "luci-app-autoupdate ipk: $autoupdate_ipk"

          echo "== sanity: show matched stanzas (top) =="
          awk 'BEGIN{RS=""} $0 ~ /^Package: luci-app-tailscale$/m {print; exit}' /tmp/waynesg.Packages | sed -n '1,60p'
          echo "---"
          awk 'BEGIN{RS=""} $0 ~ /^Package: luci-app-autoupdate$/m {print; exit}' /tmp/waynesg.Packages | sed -n '1,60p'

          test -n "$tailscale_ipk"
          test -n "$autoupdate_ipk"

          mkdir -p packages
          curl -fL "$FEED_BASE/$tailscale_ipk" -o "packages/$tailscale_ipk"
          curl -fL "$FEED_BASE/$autoupdate_ipk" -o "packages/$autoupdate_ipk"

          echo "== local packages dir =="
          ls -la packages | sed -n '1,120p'

          echo "== generate local Packages index =="
          make package_index V=s CONFIG_SIGNATURE_CHECK= -j1

      - name: Prepare FILES (defaults + openclash core/ui)
        run: |
          # Start from repo provided files
          rm -rf ib/files
          mkdir -p ib/files
          rsync -a image/files/ ib/files/

          # Inject OpenClash core/UI assets (optional)
          chmod +x scripts/preset-clash-core.sh
          scripts/preset-clash-core.sh amd64 ib/files

      - name: Restore cache (dl)
        uses: actions/cache/restore@v4
        with:
          path: ib/dl
          key: ${{ runner.os }}-ib-dl-${{ hashFiles('image/files/**', '.github/workflows/imagebuilder.yml') }}
          restore-keys: |
            ${{ runner.os }}-ib-dl-

      - name: Sanity check waynesg feed (Pages)
        if: always()
        run: |
          set -e
          echo "== HEAD Packages.gz =="
          curl -fsSI "https://waynesg.github.io/OpenWrt-ImageBuilder/feed/Packages.gz" | sed -n '1,120p'
          echo "== verify packages exist in index =="
          curl -fsSL "https://waynesg.github.io/OpenWrt-ImageBuilder/feed/Packages.gz" \
            | gzip -dc \
            | grep -nE '^Package: luci-app-(tailscale|autoupdate)$' || true
          echo "== download Packages.gz (first bytes) =="
          curl -fsSL "https://waynesg.github.io/OpenWrt-ImageBuilder/feed/Packages.gz" | head -c 64 | xxd

      - name: "Preflight: does ImageBuilder opkg see the 3rd-party packages?"
        if: always()
        run: |
          cd ib
          # package_list lists from all configured repos (including local file:packages).
          make package_list V=s CONFIG_SIGNATURE_CHECK= -j1 | grep -E '^luci-app-(tailscale|autoupdate) ' || true

      - name: "Debug: repos + opkg-lists (after make image)"
        if: always()
        run: |
          cd ib
          echo "== repositories.conf =="
          sed -n '1,260p' repositories.conf || true

          echo "== opkg-lists files (all) =="
          find build_dir -type f -path '*/tmp/opkg-lists/*' -print 2>/dev/null | head -n 200 || true

          echo "== luci candidates (from opkg-lists) =="
          grep -RIn '^Package: luci' build_dir/*/root-*/tmp/opkg-lists 2>/dev/null | head -n 80 || true

          echo "== tailscale candidates (from opkg-lists) =="
          grep -RIn '^Package: tailscale' build_dir/*/root-*/tmp/opkg-lists 2>/dev/null || true

          echo "== autoupdate candidates (from opkg-lists) =="
          grep -RIn '^Package: luci-app-autoupdate' build_dir/*/root-*/tmp/opkg-lists 2>/dev/null || true

          echo "== luci-ssl candidates (from opkg-lists) =="
          grep -RIn '^Package: luci-ssl' build_dir/*/root-*/tmp/opkg-lists 2>/dev/null || true

          echo "== libustream candidates (from opkg-lists) =="
          grep -RIn '^Package: libustream' build_dir/*/root-*/tmp/opkg-lists 2>/dev/null || true

      - name: Warmup (prepare downloads via a no-op image build)
        if: inputs.mode == 'warmup'
        run: |
          cd ib
          # Warmup: keep package set minimal.
          make image PROFILE="generic" FILES="files" PACKAGES="\
            luci \
            tailscale \
          " V=s CONFIG_SIGNATURE_CHECK=

      - name: Save cache (dl)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ib/dl
          key: ${{ runner.os }}-ib-dl-${{ hashFiles('image/files/**', '.github/workflows/imagebuilder.yml') }}

      - name: "Debug: un-silence package_index and print failure cause"
        if: always()
        run: |
          cd ib
          echo "== Patch Makefile to show package_index output =="
          # The ImageBuilder Makefile hides package_index output (>/dev/null 2>/dev/null), making CI failures opaque.
          # Remove that redirection so we can see the real error in logs.
          perl -0777 -i -pe 's/\)\s*>\/dev\/null\s*2>\/dev\/null/\)\n/g' Makefile
          echo "== Show Makefile package_index section =="
          awk 'NR>=165 && NR<=210 {print NR ":" $0}' Makefile

          echo "== Try: make package_index (verbose) =="
          make package_index V=s CONFIG_SIGNATURE_CHECK= -j1 || true

      - name: Build image
        if: inputs.mode == 'build'
        run: |
          cd ib
          # Build: include third-party LuCI apps from your gh-pages feed.
          make image PROFILE="generic" FILES="files" PACKAGES="\
            luci \
            tailscale \
            luci-app-tailscale \
            luci-app-autoupdate \
          " V=s CONFIG_SIGNATURE_CHECK= -j1

      - name: Upload images
        if: inputs.mode == 'build'
        uses: actions/upload-artifact@v4
        with:
          name: imagebuilder-output
          path: ib/bin/targets/**
